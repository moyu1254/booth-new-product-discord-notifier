name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name booth-notifier main.py

      - name: Create distribution zip
        run: |
          echo '[]' | Out-File -FilePath seen_products.json -Encoding utf8NoBOM
          Compress-Archive -Path dist/booth-notifier.exe, config.example.json, seen_products.json, README.md -DestinationPath booth-notifier-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: booth-notifier-windows.zip
          generate_release_notes: true
